# deployments/notification-service.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: shopnest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: python:3.11-slim
          workingDir: /app
          command: ["python", "src/app.py"]
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: MONGODB_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: MONGODB_HOST
            - name: MONGODB_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: MONGODB_PORT
            - name: MONGODB_USERNAME
              value: "notifservice"
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopnest-secrets
                  key: MONGO_PASSWORD
            - name: MONGODB_DATABASE
              value: "notificationdb"
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: RABBITMQ_PORT
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: shopnest
spec:
  selector:
    app: notification-service
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
