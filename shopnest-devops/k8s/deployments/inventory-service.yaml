# deployments/inventory-service.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: shopnest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: node:18-alpine
          workingDir: /app
          command: ["node", "src/index.js"]
          ports:
            - containerPort: 3005
          env:
            - name: PORT
              value: "3005"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: DB_PORT
            - name: DB_NAME
              value: "inventorydb"
            - name: DB_USERNAME
              value: "inventoryservice"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopnest-secrets
                  key: INVENTORY_DB_PASSWORD
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: RABBITMQ_PORT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopnest-secrets
                  key: JWT_SECRET
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: NODE_ENV
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: shopnest
spec:
  selector:
    app: inventory-service
  ports:
    - port: 3005
      targetPort: 3005
  type: ClusterIP
