# deployments/order-service.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: shopnest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: python:3.11-slim
          workingDir: /app
          command: ["python", "src/app.py"]
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: DB_PORT
            - name: DB_NAME
              value: "orderdb"
            - name: DB_USERNAME
              value: "orderservice"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopnest-secrets
                  key: ORDER_DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopnest-secrets
                  key: REDIS_PASSWORD
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnest-config
                  key: RABBITMQ_PORT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopnest-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: shopnest
spec:
  selector:
    app: order-service
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP
